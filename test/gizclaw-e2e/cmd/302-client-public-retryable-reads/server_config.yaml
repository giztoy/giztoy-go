listen: "__LISTEN_ADDR__"
storage:
  memory:
    kind: keyvalue
    memory: {}
  local-files:
    kind: filesystem
    fs:
      dir: .
  firmware-depot:
    kind: depotstore
    depot-fs: {}
stores:
  gears:
    kind: keyvalue
    storage: memory
    prefix: gears
  credentials:
    kind: keyvalue
    storage: memory
    prefix: credentials
  minimax-tenants:
    kind: keyvalue
    storage: memory
    prefix: minimax-tenants
  voices:
    kind: keyvalue
    storage: memory
    prefix: voices
  workspaces:
    kind: keyvalue
    storage: memory
    prefix: workspaces
  workspace-templates:
    kind: keyvalue
    storage: memory
    prefix: workspace-templates
  firmware:
    kind: depotstore
    storage: firmware-depot
    depot-fs:
      filesystem:
        storage: local-files
        base-dir: firmware
gears:
  store: gears
  registration-tokens:
    device_default:
      role: device
credentials:
  store: credentials
minimax:
  tenants-store: minimax-tenants
  voices-store: voices
  credentials-store: credentials
workspaces:
  store: workspaces
  templates-store: workspace-templates
workspace-templates:
  store: workspace-templates
depots:
  store: firmware
